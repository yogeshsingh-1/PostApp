version: "3.1"
services : 
    backend: 
      build: ./backend
      ports: 
        - "5000:5000"
      depends_on: 
        - db
    frontend:
      build: ./frontend
      ports:
        - "5173:5173"
      depends_on: 
        - backend
      
    db:
      image: postgres:16-alpine
      ports: 
        - "5432:5432"
      volumes: 
        - db_postgres:/var/lib/postgresql/data
      environment:
        POSTGRES_PASSWORD: demo

volumes:
  db_postgres:
          